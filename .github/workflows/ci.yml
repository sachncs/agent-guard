name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true  # v1 clippy carries warnings; tracked separately

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo build --workspace --release

  python:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e python/agentguard
          pip install -e python/agentguard_langchain
          python -c "from agentguard import Client; print('SDK OK')"

  ts:
    name: typescript sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd typescript/agentguard
          npm install
          npm run build

  examples:
    name: example smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cargo install --path crates/agentguard-cli --locked
      - run: pip install -e python/agentguard
      - run: python examples/basic-tool-authz/main.py
      - run: python examples/multi-agent-delegation/main.py
      - run: python examples/jwt-auth/main.py
      - run: python examples/hash-chain-verify/main.py