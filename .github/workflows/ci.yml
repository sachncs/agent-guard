name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo build --workspace --release
      - run: cargo bench --workspace --no-run

  python:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e python/agentguard
          pip install -e python/agentguard_langchain
          python -c "from agentguard import Client; print('SDK OK')"

  ts:
    name: typescript sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd typescript/agentguard
          npm install
          npm run build

  examples:
    name: example smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cargo install --path crates/agentguard-cli --locked
      - run: pip install -e python/agentguard
      - run: python examples/basic-tool-authz/main.py
      - run: python examples/multi-agent-delegation/main.py
      - run: python examples/jwt-auth/main.py
      - run: python examples/hash-chain-verify/main.py
      - run: python examples/dpop-protected/main.py

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --locked
      # Bans + licenses + sources are blocking: we own the surface and
      # can fix violations directly.
      - run: cargo deny check bans licenses sources
      # Advisories are non-blocking: rustls-webpki 0.101 (RustSec
      # 2026-0098, name-constraint bypass) and rsa 0.9 (RustSec
      # 2023-0071, Marvin timing attack) are transitive deps from
      # openidconnect 3.5 / reqwest 0.11. Fixing them requires upgrading
      # to openidconnect >=0.6 / reqwest 0.13 / rustls 0.24 — tracked
      # as a v0.3 follow-up. See CHANGELOG.md.
      - name: cargo-deny advisories (informational, tracked for v0.3)
        run: cargo deny check advisories
        continue-on-error: true