name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      # Doctests are run separately so a single failing docstring
      # fails CI even when the lib tests pass. Mirrors `cargo test`
      # output for the lib crate but only runs the doc-tests.
      - run: cargo test --workspace --doc
      - run: cargo build --workspace --release
      - run: cargo bench --workspace --no-run

  python:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e python/agentguard[dev]
          pip install -e python/agentguard_langchain[dev]
          pytest python/agentguard/tests -q
          python -c "from agentguard import Client; print('SDK OK')"

  ts:
    name: typescript sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd typescript/agentguard
          npm install
          npm test
          npm run build

  examples:
    name: example smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cargo install --path crates/agentguard-cli --locked
      - run: pip install -e python/agentguard
      - run: python examples/basic-tool-authz/main.py
      - run: python examples/multi-agent-delegation/main.py
      - run: python examples/jwt-auth/main.py
      - run: python examples/hash-chain-verify/main.py
      - run: python examples/dpop-protected/main.py

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --locked
      # Bans + licenses + sources are blocking: we own the surface and
      # can fix violations directly.
      - run: cargo deny check bans licenses sources
      # Advisories are blocking. The deny.toml ignore list reflects
      # the only known transitive vulnerabilities (ring <0.17, see
      # CHANGELOG.md for the v0.3 follow-up).
      - run: cargo deny check advisories

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      # Hard gate: any unignored advisory fails CI.
      - run: cargo audit --deny warnings

  coverage:
    name: cargo llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
        with:
          version: latest
      - run: cargo llvm-cov --workspace --lcov --output-path coverage.lcov
      - name: enforce 80% line coverage
        run: |
          COV=$(cargo llvm-cov report --summary-only | grep -oE '[0-9.]+\.[0-9]+%' | head -1 | tr -d '%')
          echo "Line coverage: $COV%"
          awk -v cov="$COV" 'BEGIN { exit !(cov+0 >= 80) }'
          echo "Coverage gate passed: $COV% >= 80%"

  fuzz:
    name: cargo fuzz (nightly)
    runs-on: ubuntu-latest
    needs: fmt
    # Nightly fuzz job to keep the existing fuzz harnesses honest.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
      - run: cargo install cargo-fuzz --locked
      # Each harness runs for 60 seconds; coverage grows quickly
      # because the audit log + decision cache are the hot paths.
      - run: cargo fuzz run --release hash_chain_append -- -max_total_time=60
      - run: cargo fuzz run --release canonical_json -- -max_total_time=60
      - run: cargo fuzz run --release glob_match -- -max_total_time=60

  miri:
    name: cargo miri (nightly)
    runs-on: ubuntu-latest
    needs: fmt
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: miri
      - run: cargo miri setup
      # Miri is slow; just the cryptographic + canonical-JSON paths.
      - run: cargo miri test -p agentguard-core --lib decision::chain
      - run: cargo miri test -p agentguard-core --lib decision::canonical
      - run: cargo miri test -p agentguard-core --lib delegation::tests::glob_match_wildcards