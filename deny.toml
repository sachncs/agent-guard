# agentguard's `cargo-deny` configuration.
#
# Catches: forbidden licenses, abandoned crates, vulnerable
# dependencies, and duplicate versions of the same crate.
#
# Run with: `cargo deny check`

[graph]
all-features = false

[advisories]
# Fail the build on any advisory from the RustSec database.
# Active advisories on the current dependency tree (transitive, no
# direct upgrade path without bumping cedar-policy / aws-lc-rs).
# Tracked as a v0.3 follow-up.
version = 2
ignore = [
    # ring <0.17 unmaintained (transitive via aws-lc-rs / rustls).
    # The two ring advisories were merged in newer RustSec releases
    # under different IDs — keep this as the catch-all placeholder
    # for the v0.3 follow-up.
    "RUSTSEC-2025-0010",
    # rustls-pemfile archived (transitive via axum-server, tonic).
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
# Tightened: every transitive license in the current Cargo.lock is one
# of these. We keep the explicit list (instead of `confidence-threshold`)
# so a new transitive license is a blocking CI failure rather than a
# silent widening.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
deny = [
    { name = "openssl", version = "*" },
    { name = "openssl-sys", version = "*" },
    { name = "native-tls", version = "*" },
]
# Multiple versions are common in a layered dependency graph (e.g. reqwest
# 0.11 from oauth2 vs 0.12 from the rest of the workspace). We warn rather
# than fail so that upgrading lower-level deps doesn't block the build;
# the workspace can resolve the duplicates later via feature unification.
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]