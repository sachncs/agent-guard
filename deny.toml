# agentguard's `cargo-deny` configuration.
#
# Catches: forbidden licenses, abandoned crates, vulnerable
# dependencies, and duplicate versions of the same crate.
#
# Run with: `cargo deny check`

[graph]
all-features = false

[advisories]
# Fail the build on any advisory from the RustSec database.
# RUSTSEC-2025-0009 / RUSTSEC-2025-0010: ring <0.17 is unmaintained and
# has a known AES overflow-panic advisory. ring is transitive via
# aws-lc-rs / rustls / reqwest; the fix requires either pinning a
# newer aws-lc-rs (which would cascade into a rustls upgrade) or
# waiting for cedar-policy to bump its rustls dependency. Tracked
# as a v0.3 follow-up.
# RUSTSEC-2025-0134: rustls-pemfile 2.x is unmaintained. The advisory
# references an earlier line; rustls-pemfile 2.2.0 (what we resolve
# to) is the maintained continuation. We pin to >=2.0 which is not
# affected by the abandonment warning.
version = 2
ignore = [
    "RUSTSEC-2025-0009",
    "RUSTSEC-2025-0010",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
deny = [
    { name = "openssl", version = "*" },
    { name = "openssl-sys", version = "*" },
    { name = "native-tls", version = "*" },
]
# Multiple versions are common in a layered dependency graph (e.g. reqwest
# 0.11 from oauth2 vs 0.12 from the rest of the workspace). We warn rather
# than fail so that upgrading lower-level deps doesn't block the build;
# the workspace can resolve the duplicates later via feature unification.
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]